<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I Rasa Perfumes - Register</title>
  <link rel="icon" href="img/favicon-irasa.png" type="image/png">
  <link rel="stylesheet" href="vendors/bootstrap/bootstrap.min.css">
  <link rel="stylesheet" href="vendors/fontawesome/css/all.min.css">
  <link rel="stylesheet" href="vendors/themify-icons/themify-icons.css">
  <link rel="stylesheet" href="css/style.css">
  <link href="css/vendors/aos.css" rel="stylesheet">
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      font-family: 'Outfit', sans-serif;
    }

    .auth-wrapper {
      height: 100vh;
      width: 100vw;
      background: url('luxury_perfume_background_1778492071364.png') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .auth-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(8px);
    }

    .auth-card {
      position: relative;
      width: 1000px;
      max-width: 90%;
      height: 700px;
      /* Slightly taller for register */
      background: #0d0d0d;
      border: 1px solid #333;
      border-radius: 20px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      z-index: 10;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .auth-left {
      flex: 1;
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(0, 0, 0, 0) 100%),
        url('img/gallery/r2.webp') center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 50px;
      position: relative;
    }

    .auth-left::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, #000 0%, transparent 100%);
    }

    .auth-left-content {
      position: relative;
      z-index: 2;
    }

    .auth-left h2 {
      font-family: 'Playfair Display', serif;
      color: #d4af37;
      font-size: 32px;
      margin-bottom: 15px;
    }

    .auth-left p {
      color: #bbb;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    .auth-right {
      flex: 1.2;
      /* More space for form */
      padding: 50px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .auth-right::-webkit-scrollbar {
      display: none;
    }

    .auth-header {
      margin-bottom: 30px;
    }

    .auth-header h3 {
      font-family: 'Playfair Display', serif;
      color: #fff;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .auth-header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 18px;
      position: relative;
    }

    .form-control {
      background: #1a1a1a !important;
      border: 1px solid #333 !important;
      color: #fff !important;
      height: 46px !important;
      border-radius: 10px !important;
      padding: 0 18px !important;
      font-size: 13px !important;
    }

    .form-control:focus {
      border-color: #d4af37 !important;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.2) !important;
    }

    .btn-auth {
      background: linear-gradient(135deg, #d4af37 0%, #aa8422 100%);
      color: #000 !important;
      height: 48px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      border: none;
      width: 100%;
      margin-top: 10px;
      margin-bottom: 15px;
      transition: all 0.3s;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
    }

    .auth-footer {
      text-align: center;
      font-size: 13px;
      color: #666;
    }

    .auth-footer a {
      color: #d4af37;
      text-decoration: none;
      font-weight: 600;
    }

    .back-home {
      position: absolute;
      top: 30px;
      left: 30px;
      color: #fff;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      z-index: 20;
      transition: all 0.3s;
      background: rgba(255, 255, 255, 0.05);
      padding: 8px 15px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
    }

    .back-home:hover {
      color: #d4af37;
      border-color: #d4af37;
      background: rgba(212, 175, 55, 0.1);
    }

    .otp-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: #d4af37;
      color: #000;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      z-index: 5;
    }

    @media (max-width: 991px) {
      .auth-left {
        display: none;
      }

      .auth-card {
        max-width: 500px;
        height: 90vh;
      }

      .back-home {
        top: 20px;
        left: 20px;
        font-size: 12px;
        padding: 6px 12px;
      }
    }

    @media (max-width: 576px) {
      .back-home span {
        display: none;
      }

      .back-home {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        justify-content: center;
        padding: 0;
      }

      .back-home i {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <div class="auth-wrapper">
    <a href="index.html" class="back-home">
      <i class="fas fa-arrow-left"></i> <span>Back to Home</span>
    </a>

    <div class="auth-card">
      <div class="auth-left">
        <div class="auth-left-content">
          <h2>Welcome Back to Luxury</h2>
          <p>Already a member? Log in to your account to manage your collection and view your order history.</p>
          <a href="login.html" class="btn btn-outline-light"
            style="border-radius: 10px; padding: 10px 30px; border: 1px solid #d4af37; color: #d4af37;">Log In Now</a>
        </div>
      </div>

      <div class="auth-right">
        <div class="auth-header">
          <h3>Create an account</h3>
          <p>Experience artisanal fragrances like never before.</p>
        </div>

        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <input type="text" class="form-control" placeholder="Full Name" required>
          </div>
          <div class="form-group">
            <input type="tel" class="form-control" placeholder="Phone Number" required>
          </div>
          <div class="form-group">
            <input type="email" id="email" class="form-control" placeholder="Email Address" required>
            <button type="button" onclick="sendOTP()" id="btnSendOtp" class="otp-btn">Send OTP</button>
          </div>

          <div id="otp_section" class="form-group" style="display: none;">
            <input type="text" id="otp" class="form-control" placeholder="Enter 6-digit OTP">
            <button type="button" onclick="verifyOTP()" class="otp-btn"
              style="background: #28a745; color: #fff;">Verify</button>
          </div>

          <div class="form-group">
            <input type="password" id="password" class="form-control" placeholder="Password" required>
            <span onclick="togglePass('password', this)"
              style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; z-index: 5;">
              <i class="fas fa-eye"></i>
            </span>
          </div>

          <div class="form-group">
            <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm Password" required>
          </div>

          <div class="custom-control custom-checkbox mb-3">
            <input type="checkbox" class="custom-control-input" id="terms" required>
            <label class="custom-control-label" for="terms" style="color: #666; font-size: 11px;">I agree to the Terms &
              Conditions</label>
          </div>

          <button type="submit" id="btnRegister" class="btn-auth" disabled style="opacity: 0.6;">Register
            Account</button>
        </form>

        <div class="auth-footer">
          Already have an account? <a href="login.html">Log in</a>
        </div>
      </div>
    </div>
  </div>

  <script src="vendors/jquery/jquery-3.2.1.min.js"></script>
  <script src="vendors/bootstrap/bootstrap.bundle.min.js"></script>
  <script>
    const AUTH_API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://localhost:8080/api/auth'
      : '/api/auth';

    // If already logged in, redirect to home
    (async () => {
      try {
        const res = await fetch(`${AUTH_API}/me`, { credentials: 'include' });
        const data = await res.json();
        if (data.success) window.location.href = 'index.html';
      } catch (e) { }
    })();

    function togglePass(inputId, icon) {
      var x = document.getElementById(inputId);
      var i = icon.querySelector('i');
      if (x.type === 'password') {
        x.type = 'text';
        i.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        x.type = 'password';
        i.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    // OTP state (visual only — real verification is done via email link)
    async function sendOTP() {
      const email = $('#email').val().trim();
      if (!email || !/^[^@]+@[^@]+\.[^@]+$/.test(email)) {
        showAlert('error', 'Please enter a valid email address first.');
        return;
      }

      const btn = $('#btnSendOtp');
      btn.prop('disabled', true).text('Sending...');

      try {
        const res = await fetch(`${AUTH_API}/send-otp`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (data.success) {
          $('#otp_section').slideDown();
          btn.text('Resend OTP').prop('disabled', false);
          showAlert('success', data.message);
        } else {
          showAlert('error', data.message);
          btn.text('Send OTP').prop('disabled', false);
        }
      } catch (err) {
        showAlert('error', 'Failed to send OTP. Please try again.');
        btn.text('Send OTP').prop('disabled', false);
      }
    }

    async function verifyOTP() {
      const email = $('#email').val().trim();
      const otp = $('#otp').val().trim();

      if (!otp || otp.length !== 6) {
        showAlert('error', 'Please enter the 6-digit code.');
        return;
      }

      try {
        const res = await fetch(`${AUTH_API}/verify-otp`, {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp })
        });
        const data = await res.json();

        if (data.success) {
          $('#otp_section').slideUp();
          $('#btnSendOtp').html('<i class="fas fa-check mr-1"></i> Email Verified').css('background', '#28a745').prop('disabled', true);
          $('#email').prop('readonly', true);
          $('#btnRegister').prop('disabled', false).css('opacity', '1');
          showAlert('success', 'Email verified! You can now register.');
        } else {
          showAlert('error', data.message);
        }
      } catch (err) {
        showAlert('error', 'Verification failed. Please try again.');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();

      const fullName = $('input[placeholder="Full Name"]').val().trim();
      const phone = $('input[placeholder="Phone Number"]').val().trim();
      const email = $('#email').val().trim();
      const password = $('#password').val();
      const confirm = $('#confirmPassword').val();
      const terms = $('#terms').is(':checked');

      if (!fullName || !phone || !email || !password || !confirm) {
        showAlert('error', 'Please fill in all required fields.'); return;
      }
      if (password !== confirm) {
        showAlert('error', 'Passwords do not match.'); return;
      }
      if (password.length < 8) {
        showAlert('error', 'Password must be at least 8 characters.'); return;
      }
      if (!/^[6-9]\d{9}$/.test(phone)) {
        showAlert('error', 'Please enter a valid 10-digit Indian mobile number.'); return;
      }
      if (!terms) {
        showAlert('error', 'You must accept the Terms & Conditions.'); return;
      }

      const btn = document.getElementById('btnRegister');
      btn.disabled = true;
      btn.textContent = 'Creating Account...';

      try {
        const res = await fetch(`${AUTH_API}/register`, {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ fullName, phone, email, password })
        });
        const data = await res.json();

        if (data.success) {
          // Show success state
          $('.auth-right form').hide();
          $('.auth-footer').hide();
          $('.auth-header h3').text('Account Created..!!!');
          $('.auth-header p').text('Check your email to verify and activate your account.');
          $('.auth-header').after(`
            <div style="text-align:center;padding:30px 0;">
              <div style="font-size:64px;margin-bottom:20px;color:#d4af37;"><i class="fas fa-envelope-open-text"></i></div>
              <p style="color:#ccc;line-height:1.8;font-size:14px;">
                We've sent a verification link to <strong style="color:#d4af37;">${email}</strong>.<br>
                Please verify your email to complete registration.
              </p>
              <a href="login.html" style="display:inline-block;margin-top:24px;background:linear-gradient(135deg,#d4af37,#aa8422);color:#000;padding:12px 30px;border-radius:10px;font-weight:700;text-decoration:none;">
                Go to Login <i class="fas fa-chevron-right ml-1"></i>
              </a>
            </div>
          `);
        } else {
          showAlert('error', data.message || 'Registration failed. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Register Account';
        }
      } catch (err) {
        showAlert('error', 'Unable to connect to server. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Register Account';
      }
    }

    function showAlert(type, msg) {
      var el = document.getElementById('regAlert');
      if (!el) {
        el = document.createElement('div');
        el.id = 'regAlert';
        el.style.cssText = 'padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:20px;line-height:1.6;';
        $('.auth-right form').prepend(el);
      }

      // If message contains multiple errors (separated by comma), format as list
      if (msg.includes(', ')) {
        const errors = msg.split(', ');
        msg = '<ul style="margin:0;padding-left:20px;">' +
          errors.map(err => `<li>${err}</li>`).join('') +
          '</ul>';
        el.innerHTML = msg;
      } else {
        el.innerHTML = msg;
      }

      el.style.background = type === 'success' ? 'rgba(212,175,55,0.12)'
        : type === 'info' ? 'rgba(100,100,200,0.12)'
          : 'rgba(255,77,77,0.12)';
      el.style.color = type === 'success' ? '#d4af37' : type === 'info' ? '#8899ff' : '#ff6b6b';
      el.style.border = type === 'success' ? '1px solid rgba(212,175,55,0.25)'
        : type === 'info' ? '1px solid rgba(100,100,200,0.25)'
          : '1px solid rgba(255,77,77,0.2)';
    }
  </script>
</body>

</html>
